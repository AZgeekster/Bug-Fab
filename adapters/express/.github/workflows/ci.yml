name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Node ${{ matrix.node }} — vitest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit + integration tests
        run: npm run test

      - name: Coverage
        if: matrix.node == '20'
        run: npm run test:coverage

  conformance:
    name: Cross-stack conformance (pytest plugin against booted Express)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: npm ci
      - run: npm run build

      # Pre-release of the Bug-Fab conformance plugin (Python).
      - run: pip install --pre 'bug-fab>=0.1'

      # v0.2 follow-up: wire the conformance harness end-to-end. The
      # adapter ships `examples/server.ts`, but the upstream `bug-fab`
      # pytest plugin's cross-stack runner is still stabilizing. Once
      # it lands, replace this block with a background boot of the
      # example server and a pytest invocation against it.
      - name: Conformance check (deferred to v0.2)
        run: |
          test -f examples/server.ts
          echo "examples/server.ts present; conformance harness wires up in v0.2."
