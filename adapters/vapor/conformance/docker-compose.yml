# Cross-stack conformance harness for the Bug-Fab Swift (Vapor) adapter.
#
# Two services on a shared bridge network:
#   - adapter:   swift:6.0, boots the `BugFabExample` executable target,
#                exposing intake under /api and the viewer under /admin on :8080.
#   - runner:    python:3.12, pip-installs the bug-fab wheel from the repo root,
#                runs `pytest --bug-fab-conformance` against the adapter container.
#
# WHY the source is copied into the container instead of run from the mount:
#   - SwiftPM writes .build/ into the package dir and the example writes
#     ./bug-fab-data into its cwd. Running from the read-only repo mount would
#     fail, and a writable mount would dirty the host working copy (and mix
#     host-OS build artifacts into the Linux build). A tar copy (excluding
#     .build) keeps the harness side-effect-free; named volumes hold SwiftPM's
#     scratch + cache so re-runs skip the multi-minute first compile.

services:
  adapter:
    image: swift:6.0
    container_name: bug-fab-vapor-conformance-adapter
    working_dir: /work
    volumes:
      - ../../..:/src:ro
      - swift-scratch:/scratch
      - swift-cache:/cache
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        # The copy is renamed to bugfab-vapor: SwiftPM derives a package
        # identity from the directory name, and a root directory named
        # "vapor" collides with the vapor/vapor dependency ("product
        # 'Vapor' ... not found in package 'vapor'"). The rm keeps the
        # boot idempotent — /work persists across `docker compose
        # restart`, and a stale copy would break the mv (and serve stale
        # source).
        rm -rf /work/vapor /work/bugfab-vapor
        tar -C /src/adapters --exclude=.build -cf - vapor | tar -C /work -xf -
        mv /work/vapor /work/bugfab-vapor
        cd /work/bugfab-vapor
        exec swift run --scratch-path /scratch --cache-path /cache \
          BugFabExample serve --hostname 0.0.0.0 --port 8080
    ports:
      - "18082:8080"
    healthcheck:
      # The example exposes GET /healthz; a successful TCP connect is enough —
      # Vapor only binds after every route is registered. (No wget/curl
      # guarantee in the swift image, so use bash's /dev/tcp.)
      test: ["CMD-SHELL", "timeout 3 bash -c 'echo > /dev/tcp/localhost/8080'"]
      interval: 4s
      timeout: 5s
      retries: 450
      start_period: 30s
    networks:
      - bugfab-conformance

  runner:
    image: python:3.12
    container_name: bug-fab-vapor-conformance-runner
    depends_on:
      adapter:
        condition: service_healthy
    # Working dir is /work (NOT /src) so pytest does NOT pick up the repo's own
    # `tests/conftest.py`; the conformance plugin injects the bundled test
    # directory regardless of cwd.
    working_dir: /work
    volumes:
      - ../../..:/src:ro
      - ./out:/out
      - pip-cache:/root/.cache/pip
    environment:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        mkdir -p /work
        cd /work
        pip install --quiet /src pytest
        pytest --bug-fab-conformance \
               --base-url=http://adapter:8080/api \
               --viewer-base-url=http://adapter:8080/admin \
               -v --tb=short \
               --color=no \
               -o cache_dir=/tmp/.pytest_cache \
               --rootdir=/work \
               2>&1 | tee /out/conformance-results.txt
    networks:
      - bugfab-conformance

volumes:
  swift-scratch:
  swift-cache:
  pip-cache:

networks:
  bugfab-conformance:
    driver: bridge
