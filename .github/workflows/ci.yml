name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev dependencies
        # `flask` is required: without it the Flask-adapter tests skip and
        # coverage drops below the 85% gate. All first-party Python adapter
        # extras (sqlite/postgres/flask/django) must be installed so their
        # suites run and count toward coverage.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,sqlite,postgres,flask,django]"

      - name: Lint with ruff
        run: ruff check .

      - name: Format check with ruff
        run: ruff format --check .

      - name: Run tests with coverage
        # WHY `coverage run -m pytest` instead of `pytest --cov`:
        # the bug-fab-conformance pytest11 entry-point imports `bug_fab`
        # before pytest-cov hooks in, so class-body statements (Pydantic
        # models, ABCs) execute pre-coverage and don't get counted —
        # which would silently undercount coverage by ~20pp.
        # Driving coverage from outside pytest avoids the ordering bug.
        run: |
          coverage run --source=bug_fab --branch -m pytest
          coverage report --fail-under=85 --show-missing
          coverage xml

      - name: Verify protocol-schema.json is up to date
        # The JSON Schema is the authoritative wire-protocol contract.
        # Fails the build if bug_fab/schemas.py changed without a corresponding
        # `python scripts/generate_protocol_schema.py` regeneration.
        run: python scripts/generate_protocol_schema.py --check

      - name: Verify Django migrations match models
        # The Django adapter ships a hand-authored 0001_initial migration
        # (see `bug_fab/adapters/django/migrations/0001_initial.py`).
        # Fails the build if `bug_fab/adapters/django/models.py` drifts from
        # the migration without a regenerated migration alongside it.
        # Uses the django-minimal example's settings — it already wires the
        # adapter into INSTALLED_APPS — and asserts a zero diff.
        working-directory: examples/django-minimal
        run: python manage.py makemigrations --check --dry-run bug_fab

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v5
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  conformance:
    # The bundled conformance suite is the wire-protocol contract every
    # adapter is measured against. Until this job existed, nothing ran it
    # against the reference implementation — and the reference was less
    # conformant than most of its own adapters (it never emitted the
    # `{error, detail}` envelope and had no protocol_version gate).
    name: conformance (reference adapter)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev dependencies
        # uvicorn is required to boot the example server below — `[dev]`
        # alone ships no ASGI server, so the boot step would fail with the
        # example never coming up. The example uses the default file
        # storage, so no storage extra is needed.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" "uvicorn[standard]"

      - name: Boot the reference adapter
        # Mirrors tests/e2e/conftest.py: ephemeral-free port, poll until the
        # viewer answers, 20s deadline, dump the server log on failure so a
        # boot error is visible instead of a bare connection-refused.
        working-directory: examples/fastapi-minimal
        run: |
          python -m uvicorn main:app --host 127.0.0.1 --port 8931 --log-level warning \
            > "${RUNNER_TEMP}/conformance-server.log" 2>&1 &
          echo $! > "${RUNNER_TEMP}/conformance-server.pid"
          deadline=$((SECONDS + 20))
          until curl -fsS -o /dev/null "http://127.0.0.1:8931/admin/bug-reports/reports"; do
            if [ "${SECONDS}" -ge "${deadline}" ]; then
              echo "::error::reference adapter failed to boot within 20s"
              cat "${RUNNER_TEMP}/conformance-server.log"
              exit 1
            fi
            sleep 0.5
          done

      - name: Run the conformance suite against the reference
        # Two base URLs because the example splits its mounts:
        # submit_router at /api, viewer_router at /admin/bug-reports.
        run: |
          pytest --bug-fab-conformance \
                 --base-url=http://127.0.0.1:8931/api \
                 --viewer-base-url=http://127.0.0.1:8931/admin/bug-reports

      - name: Stop the reference adapter
        if: always()
        run: |
          if [ -f "${RUNNER_TEMP}/conformance-server.pid" ]; then
            kill "$(cat "${RUNNER_TEMP}/conformance-server.pid")" || true
          fi

      - name: Dump server log on failure
        if: failure()
        run: cat "${RUNNER_TEMP}/conformance-server.log" || true

  adapter-conformance:
    # Runs each non-Python adapter's own Docker conformance harness against
    # the bundled protocol suite. Until this existed, the root CI ran only
    # the Python suite -- 14 adapters could drift with a green build. Three
    # adapters even shipped .github/workflows/ files nested under adapters/*/
    # that GitHub Actions never executes; those are deleted in the same change
    # that adds this job.
    name: conformance (${{ matrix.adapter }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        adapter:
          - express
          - go-gin
          - hono
          - laravel
          - phoenix
          - rails
          - rust-axum
          - spring-boot-kotlin
          - sveltekit
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run the adapter conformance harness
        # Each harness is self-contained (docker compose up + the python
        # conformance plugin from a sibling container) and exit-code-faithful:
        # 0 pass, 1 non-conformant, 2 harness failure. ubuntu-latest ships
        # Docker + compose, so no setup step is needed.
        shell: bash
        working-directory: adapters/${{ matrix.adapter }}/conformance
        run: |
          chmod +x run-conformance.sh
          ./run-conformance.sh

  e2e:
    name: e2e (browser smoke)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + e2e extras
        # `[sqlite]` is required: tests/conftest.py imports SQLiteStorage
        # (which needs sqlalchemy) at collection time, so the whole e2e run
        # errors out on `No module named 'sqlalchemy'` without it.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[e2e,sqlite]"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run e2e smoke
        run: |
          pytest tests/e2e -v --browser chromium

  build:
    name: build distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Validate distribution metadata
        run: twine check dist/*

      - name: Upload built distribution
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
          retention-days: 14

  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    # `conformance` is listed explicitly: the chain is publish -> build -> test,
    # so a job added only as a sibling of `e2e` would never gate a release.
    # A non-conformant reference implementation must not reach PyPI.
    needs: [build, conformance]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/bug-fab
    permissions:
      # Trusted Publishing — no long-lived PyPI token required.
      # Configure the trusted publisher once at:
      #   https://pypi.org/manage/account/publishing/
      id-token: write
    steps:
      - name: Download built distribution
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
