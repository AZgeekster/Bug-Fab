name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Ruby ${{ matrix.ruby }} / Rails ${{ matrix.rails }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3"]
        rails: ["7.1", "7.2", "8.0"]
        exclude:
          # Rails 8 dropped Ruby 3.1; 3.2 is the floor anyway, so no exclusions needed.
          - ruby: "3.2"
            rails: "8.0"
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
      RAILS_VERSION: ${{ matrix.rails }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Pin Rails version for matrix cell
        run: |
          bundle config set --local without "production"
          # Override the Gemfile's `~> 7.1` Rails pin per matrix cell.
          BUNDLE_FORCE_RUBY_PLATFORM=1 bundle update rails || true

      - name: Run tests
        run: bundle exec rake test

      - name: RuboCop
        run: bundle exec rubocop --no-color
        continue-on-error: true # RuboCop is advisory; style fixes don't block CI.
