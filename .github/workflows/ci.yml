name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,sqlite,postgres]"

      - name: Lint with ruff
        run: ruff check .

      - name: Format check with ruff
        run: ruff format --check .

      - name: Run tests with coverage
        # WHY `coverage run -m pytest` instead of `pytest --cov`:
        # the bug-fab-conformance pytest11 entry-point imports `bug_fab`
        # before pytest-cov hooks in, so class-body statements (Pydantic
        # models, ABCs) execute pre-coverage and don't get counted —
        # which would silently undercount coverage by ~20pp.
        # Driving coverage from outside pytest avoids the ordering bug.
        run: |
          coverage run --source=bug_fab --branch -m pytest
          coverage report --fail-under=85 --show-missing
          coverage xml

      - name: Verify protocol-schema.json is up to date
        # The JSON Schema is the authoritative wire-protocol contract.
        # Fails the build if bug_fab/schemas.py changed without a corresponding
        # `python scripts/generate_protocol_schema.py` regeneration.
        run: python scripts/generate_protocol_schema.py --check

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v5
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  e2e:
    name: e2e (browser smoke)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + e2e extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[e2e]"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run e2e smoke
        run: |
          pytest tests/e2e -v --browser chromium

  build:
    name: build distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Validate distribution metadata
        run: twine check dist/*

      - name: Upload built distribution
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
          retention-days: 14

  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/bug-fab
    permissions:
      # Trusted Publishing — no long-lived PyPI token required.
      # Configure the trusted publisher once at:
      #   https://pypi.org/manage/account/publishing/
      id-token: write
    steps:
      - name: Download built distribution
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
