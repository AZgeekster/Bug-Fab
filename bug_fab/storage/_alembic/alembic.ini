# Alembic configuration for bug-fab SQL storage backends.
#
# This file lives inside the package (rather than the repo root) so the
# migration scripts stay co-located with the models they migrate.
#
# To run migrations from a consumer project, point alembic at this file:
#
#     alembic -c $(python -c "import bug_fab.storage._alembic, os; \
#         print(os.path.join(os.path.dirname(bug_fab.storage._alembic.__file__), \
#         'alembic.ini'))") -x url=sqlite:///bugs.db upgrade head
#
# Or set BUG_FAB_DATABASE_URL and use the helper CLI shipped as
# ``python -m bug_fab.storage.migrate`` (added in a follow-up).

[alembic]
# Path to migration scripts directory. ``%(here)s`` resolves to the directory
# containing THIS .ini file at load time, so the location works no matter
# what cwd alembic is invoked from.
script_location = %(here)s

# Template used to generate migration files.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps. UTC keeps things sortable across
# contributors in different zones.
timezone = UTC

# Default URL used if neither -x url=... nor BUG_FAB_DATABASE_URL is set.
# Tests override; production consumers should always set the env var.
sqlalchemy.url = sqlite:///bug_fab.db

# Don't truncate slug; long slugs are fine for findability.
truncate_slug_length = 80

# Where the version files live. Resolved against ``script_location``.
version_locations = %(here)s/versions

# Loggers — minimal config; alembic falls back to root logger if these are
# unspecified. We keep them here so emitted SQL is visible at INFO level.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
